name: OAB Social Bot — Daily 5 Posts

on:
  schedule:
    # Segunda a sexta: 09h, 12h, 15h, 18h, 21h BRT (UTC-3)
    - cron: '0 12 * * 1-5'   # 09:00 BRT
    - cron: '0 15 * * 1-5'   # 12:00 BRT
    - cron: '0 18 * * 1-5'   # 15:00 BRT
    - cron: '0 21 * * 1-5'   # 18:00 BRT
    - cron: '0 0  * * 2-6'   # 21:00 BRT (vira meia-noite UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (não publica)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      count:
        description: 'Quantas questões publicar'
        required: false
        default: '1'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para commitar posted.json

    defaults:
      run:
        working-directory: social-bot

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: social-bot/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Sincronizar banco de questões
        run: node sync-questions.mjs

      - name: Executar pipeline
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node src/pipeline.mjs --dry-run --count=$COUNT
          else
            node src/pipeline.mjs --count=$COUNT
          fi
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCOUNT_ID:     ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN:   ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          CLOUDINARY_CLOUD_NAME:    ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:       ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:    ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_PROJECT_ID:      ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL:    ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:     ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Salvar posted.json no repositório
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "oab-social-bot"
          git config user.email "bot@estudo-oab.vercel.app"
          git add data/posted.json || true
          git diff --staged --quiet || git commit -m "chore: atualiza questões postadas [skip ci]"
          git push
