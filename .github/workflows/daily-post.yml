name: OAB Social Bot — 4 Posts/Dia

on:
  schedule:
    - cron: '30 10 * * *'
    - cron: '30 15 * * *'
    - cron: '30 21 * * *'
    - cron: '0  0  * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (nao publica)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      count:
        description: 'Quantas questoes publicar'
        required: false
        default: '1'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: social-bot

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: social-bot/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar dependencias do Puppeteer (Chromium)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 || sudo apt-get install -y -qq libasound2 || true

      - name: Renovar token Instagram (auto-refresh 60 dias)
        working-directory: ${{ github.workspace }}
        run: |
          RESPONSE=$(curl -s "https://graph.facebook.com/v19.0/oauth/access_token?grant_type=fb_exchange_token&client_id=${{ secrets.META_APP_ID }}&client_secret=${{ secrets.META_APP_SECRET }}&fb_exchange_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          NEW_TOKEN=$(echo "$RESPONSE" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');try{const j=JSON.parse(d);if(j.access_token){process.stdout.write(j.access_token);}else{process.stderr.write('Refresh falhou: '+d);}}catch(e){process.stderr.write(e.message);}")
          if [ -n "$NEW_TOKEN" ]; then
            echo "Token renovado valido por mais 60 dias"
            echo "INSTAGRAM_ACCESS_TOKEN=$NEW_TOKEN" >> $GITHUB_ENV
            gh secret set INSTAGRAM_ACCESS_TOKEN --body "$NEW_TOKEN" -R "$GITHUB_REPOSITORY" 2>/dev/null && echo "Secret atualizado" || echo "Aviso: nao foi possivel atualizar o secret"
          else
            echo "Falha ao renovar - usando token atual"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Sincronizar banco de questoes
        run: node sync-questions.mjs

      - name: Executar pipeline
        id: pipeline
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node src/pipeline.mjs --dry-run --count=$COUNT
          else
            node src/pipeline.mjs --count=$COUNT
          fi
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCOUNT_ID:     ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN:   ${{ env.INSTAGRAM_ACCESS_TOKEN || secrets.INSTAGRAM_ACCESS_TOKEN }}
          CLOUDINARY_CLOUD_NAME:    ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:       ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:    ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_PROJECT_ID:      ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL:    ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:     ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Salvar estado no repositorio
        if: always() && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "oab-social-bot"
          git config user.email "bot@estudo-oab.vercel.app"
          git add data/posted.json logs/history.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: bot — atualiza estado [skip ci]"
          git push || true

      - name: Upload da imagem gerada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-image-${{ github.run_id }}
          path: social-bot/output/*.png
          retention-days: 14

      - name: Upload dos logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: social-bot/logs/*.log
          retention-days: 30
