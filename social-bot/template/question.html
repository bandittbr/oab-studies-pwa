<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ─────────────────────────────────────────────
     CANVAS  1080 × 1080
  ───────────────────────────────────────────── */
  body {
    width:  1080px;
    height: 1080px;
    background: #0B0F1C;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    padding: 60px 64px 52px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    color: #FFFFFF;
  }

  /* ─────────────────────────────────────────────
     HEADER
  ───────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: #1A6FFF;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .logo-top {
    font-size: 13px;
    font-weight: 500;
    color: #A0AECF;
    letter-spacing: 0.04em;
  }

  .logo-bottom {
    font-size: 20px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 0.02em;
  }

  .exam-badge {
    background: #161D30;
    border: 1px solid #252E47;
    color: #C8D3F0;
    font-size: 15px;
    font-weight: 600;
    border-radius: 100px;
    padding: 8px 22px;
    letter-spacing: 0.03em;
  }

  /* ─────────────────────────────────────────────
     SUBJECT CHIP
  ───────────────────────────────────────────── */
  .subject-chip-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .subject-chip {
    background: #1A6FFF;
    color: #FFFFFF;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-radius: 100px;
    padding: 7px 22px;
  }

  /* ─────────────────────────────────────────────
     HEADLINE
  ───────────────────────────────────────────── */
  .headline {
    text-align: center;
    margin-bottom: 24px;
    flex-shrink: 0;
    line-height: 1.18;
  }

  .headline-white {
    font-size: 52px;
    font-weight: 800;
    color: #FFFFFF;
    display: block;
    letter-spacing: -0.01em;
  }

  .headline-blue {
    font-size: 52px;
    font-weight: 800;
    color: #3B9FFF;
    display: block;
    letter-spacing: -0.01em;
  }

  /* ─────────────────────────────────────────────
     QUESTION CARD
  ───────────────────────────────────────────── */
  .question-card {
    background: #131929;
    border: 1px solid #1E2840;
    border-radius: 20px;
    padding: 28px 32px 24px;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .question-icon {
    display: flex;
    justify-content: center;
    margin-bottom: 14px;
  }

  .question-icon svg {
    opacity: 0.7;
  }

  .statement-text {
    font-size: 21px;
    font-weight: 400;
    color: #C8D3F0;
    line-height: 1.6;
    text-align: center;
  }

  .statement-text.long  { font-size: 19px; }
  .statement-text.xlong { font-size: 17px; line-height: 1.55; }

  .question-line {
    font-size: 20px;
    font-weight: 600;
    color: #3B9FFF;
    text-align: center;
    margin-top: 12px;
    line-height: 1.4;
  }

  .question-line.long  { font-size: 18px; }
  .question-line.xlong { font-size: 16px; }

  /* ─────────────────────────────────────────────
     ALTERNATIVES  2 × 2
  ───────────────────────────────────────────── */
  .alternatives {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    flex-shrink: 0;
  }

  .alt {
    background: #131929;
    border: 1px solid #1E2840;
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 72px;
  }

  .alt-letter {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #1A6FFF;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: #FFFFFF;
    flex-shrink: 0;
  }

  .alt-text {
    font-size: 17px;
    font-weight: 500;
    color: #C8D3F0;
    line-height: 1.35;
  }

  /* Reduz fonte se o texto da alternativa for muito longo */
  .alt-text.sm { font-size: 15px; }
  .alt-text.xs { font-size: 13px; }

  /* ─────────────────────────────────────────────
     FOOTER
  ───────────────────────────────────────────── */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 18px;
    flex-shrink: 0;
  }

  .footer-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .footer-icon {
    font-size: 26px;
    line-height: 1;
  }

  .footer-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .footer-cta {
    font-size: 16px;
    font-weight: 700;
    color: #FFFFFF;
  }

  .footer-sub {
    font-size: 13px;
    font-weight: 400;
    color: #5A6A8A;
  }

  .footer-bookmark {
    font-size: 26px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">📖</div>
    <div class="logo-text">
      <span class="logo-top">Estudo</span>
      <span class="logo-bottom">OAB</span>
    </div>
  </div>
  <div class="exam-badge" id="examBadge"></div>
</div>

<!-- SUBJECT CHIP -->
<div class="subject-chip-wrap">
  <div class="subject-chip" id="subjectChip"></div>
</div>

<!-- HEADLINE -->
<div class="headline">
  <span class="headline-white">Você acertaria</span>
  <span class="headline-white">esta questão</span>
  <span class="headline-blue">da OAB?</span>
</div>

<!-- QUESTION CARD -->
<div class="question-card">
  <div class="question-icon">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="8" fill="#1A2540"/>
      <path d="M10 12h16M10 18h16M10 24h10" stroke="#3B9FFF" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="statement-text" id="statementText"></div>
  <div class="question-line"  id="questionLine"></div>
</div>

<!-- ALTERNATIVES -->
<div class="alternatives" id="alternatives"></div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-left">
    <div class="footer-icon">💬</div>
    <div class="footer-text">
      <span class="footer-cta">Responda nos comentários!</span>
      <span class="footer-sub">Gabarito no primeiro comentário.</span>
    </div>
  </div>
  <div class="footer-bookmark">🔖</div>
</div>

<script>
  window.renderPost = function(data) {
    // Header
    document.getElementById('examBadge').textContent = data.exam ?? '';
    document.getElementById('subjectChip').textContent =
      (data.subject ?? '').toUpperCase();

    // Enunciado: separa "corpo" da "pergunta final" (última frase terminada em ?)
    const full = data.statement ?? '';
    const qMatch = full.match(/^([\s\S]+?)([^.!?]*\?)\s*$/);
    const statEl = document.getElementById('statementText');
    const lineEl = document.getElementById('questionLine');

    let body = '', question = '';
    if (qMatch && qMatch[2].length < 180) {
      body     = qMatch[1].trim();
      question = qMatch[2].trim();
    } else {
      body = full;
    }

    statEl.textContent = body;
    lineEl.textContent = question;

    // Tamanho do enunciado
    if (body.length > 450) statEl.classList.add('xlong');
    else if (body.length > 280) statEl.classList.add('long');
    if (question.length > 100) { lineEl.classList.add('xlong'); }
    else if (question.length > 60) { lineEl.classList.add('long'); }

    // Alternativas
    const container = document.getElementById('alternatives');
    container.innerHTML = '';
    const alts = data.alternatives ?? [];
    alts.forEach(function(alt) {
      const div = document.createElement('div');
      div.className = 'alt';

      const letterDiv = document.createElement('div');
      letterDiv.className = 'alt-letter';
      letterDiv.textContent = alt.id.toUpperCase();

      const textDiv = document.createElement('div');
      textDiv.className = 'alt-text';
      textDiv.textContent = alt.text;

      // Reduz fonte se texto longo
      if (alt.text.length > 80) textDiv.classList.add('xs');
      else if (alt.text.length > 50) textDiv.classList.add('sm');

      div.appendChild(letterDiv);
      div.appendChild(textDiv);
      container.appendChild(div);
    });
  };
</script>
</body>
</html>
