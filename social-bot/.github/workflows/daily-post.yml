name: OAB Social Bot — Daily Post

on:
  schedule:
    # Publica todo dia às 09:00 BRT (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (não publica)?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: social-bot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: social-bot/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Sincronizar banco de questões
        run: node sync-questions.mjs

      - name: Executar pipeline
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node src/pipeline.mjs --dry-run
          else
            node src/pipeline.mjs
          fi
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_ACCOUNT_ID:    ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN:  ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FIREBASE_PROJECT_ID:     ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL:   ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:    ${{ secrets.FIREBASE_PRIVATE_KEY }}
          IMAGE_PUBLIC_URL:        ${{ secrets.IMAGE_PUBLIC_URL }}

      - name: Upload da imagem gerada
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-image-${{ github.run_id }}
          path: social-bot/output/*.png
          retention-days: 7
